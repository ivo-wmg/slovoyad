<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детайли на оценка — СЛОВОЯД Админ</title>
    <meta name="description" content="Детайлен преглед на оценка в админ панела на СЛОВОЯД">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/manage/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <button class="admin-mobile-toggle" aria-label="Меню">☰</button>
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h1 class="admin-logo">СЛОВОЯД</h1>
                <span class="admin-logo-sub">Админ панел</span>
            </div>
            <nav class="admin-nav">
                <a href="/manage">📊 Табло</a>
                <a href="/manage/evaluations" class="active">📋 Оценки</a>
                <a href="/manage/groups">📁 Групи</a>
                <a href="/manage/users">👥 Потребители</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="/" class="admin-nav-link">← Към сайта</a>
                <a href="#" id="logout-btn" class="admin-nav-link">🚪 Изход</a>
            </div>
        </aside>
        <main class="admin-content">
            <div class="admin-content-header">
                <a href="/manage/evaluations" class="admin-btn admin-btn-ghost">← Назад</a>
                <h2>Детайли на оценка</h2>
            </div>

            <div id="loading" style="text-align: center; padding: 4rem 0;">
                <div class="admin-spinner"></div>
                <p style="color: var(--text-muted); margin-top: 1rem;">Зареждане...</p>
            </div>

            <div id="detail-content" style="display: none;"></div>
        </main>
    </div>

    <script src="/static/manage/js/admin.js"></script>
    <script>
        const SCORE_LABELS = {
            domain_specific_score: 'Ниша',
            originality: 'Оригиналност',
            trust_and_sources: 'Доверие',
            quality_and_depth: 'Качество',
            significance_locality: 'Значимост'
        };
        const SCORE_WEIGHTS = {
            domain_specific_score: '35%',
            originality: '25%',
            trust_and_sources: '20%',
            quality_and_depth: '10%',
            significance_locality: '10%'
        };
        const SCORE_ORDER = ['domain_specific_score', 'originality', 'trust_and_sources', 'quality_and_depth', 'significance_locality'];
        const JUSTIFICATION_LABELS = {
            originality_reason: 'Оригиналност',
            significance_reason: 'Значимост и местно значение',
            domain_specific_reason: 'Специфична за нишата',
            quality_reason: 'Качество и задълбоченост',
            trust_reason: 'Доверие и източници'
        };

        const evalId = window.location.pathname.split('/').filter(Boolean).pop();

        function truncateUrl(url, maxLen = 70) {
            if (!url) return '—';
            return url.length > maxLen ? url.substring(0, maxLen) + '...' : url;
        }

        function buildScoreRingSVG(score, size = 140, strokeWidth = 10) {
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (score / 10) * circumference;
            const color = scoreColor(score);
            return `
                <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="score-ring-svg">
                    <circle cx="${size/2}" cy="${size/2}" r="${radius}"
                        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${strokeWidth}"/>
                    <circle cx="${size/2}" cy="${size/2}" r="${radius}"
                        fill="none" stroke="${color}" stroke-width="${strokeWidth}"
                        stroke-linecap="round"
                        stroke-dasharray="${circumference}"
                        stroke-dashoffset="${circumference}"
                        data-target-offset="${offset}"
                        transform="rotate(-90 ${size/2} ${size/2})"
                        style="transition: stroke-dashoffset 1.5s ease-out;"/>
                </svg>
            `;
        }

        function renderDetail(ev) {
            const container = document.getElementById('detail-content');
            const classification = ev.classification || ev.article_type || '—';
            const url = ev.url || ev.article_url || '';
            const title = ev.title_scraped || ev.title || 'Без заглавие';
            const score = ev.final_overall_score;

            let html = '';

            // Article meta card
            html += `
            <div class="admin-card fade-in">
                <h2 style="margin-bottom: 0.75rem; color: var(--text-primary); font-size: 1.35rem;">${escapeHtml(title)}</h2>
                ${url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="color: var(--accent-secondary); word-break: break-all; font-size: 0.9rem;">${escapeHtml(truncateUrl(url))}</a>` : ''}
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                    <span class="domain-badge">${escapeHtml(ev.domain || '—')}</span>
                    <span class="version-badge">v${ev.version || 1}</span>
                    <span class="classification-badge">${escapeHtml(classification)}</span>
                </div>
            </div>`;

            // Score cards grid
            html += `<div class="score-cards fade-in">`;
            for (const key of SCORE_ORDER) {
                const val = ev[key];
                const label = SCORE_LABELS[key];
                const weight = SCORE_WEIGHTS[key];
                const color = scoreColor(val);
                html += `
                <div class="score-card">
                    <div class="score-card-label">${label}</div>
                    <div class="score-card-value" style="color: ${color};">${val != null ? val.toFixed(1) : '—'}</div>
                    <div class="score-card-weight">Тежест: ${weight}</div>
                </div>`;
            }
            html += `</div>`;

            // Overall score section
            html += `
            <div class="overall-score-section admin-card fade-in" style="text-align: center; padding: 2.5rem;">
                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em;">Обща оценка</div>
                <div style="position: relative; display: inline-block;">
                    ${buildScoreRingSVG(score || 0)}
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.2rem; font-weight: 800; color: ${scoreColor(score)};">
                        ${score != null ? score.toFixed(1) : '—'}
                    </div>
                </div>
            </div>`;

            // Strengths & Weaknesses
            let strengths = ev.strengths || [];
            let weaknesses = ev.weaknesses || [];
            if (typeof strengths === 'string') { try { strengths = JSON.parse(strengths); } catch(e) { strengths = []; } }
            if (typeof weaknesses === 'string') { try { weaknesses = JSON.parse(weaknesses); } catch(e) { weaknesses = []; } }
            if (!Array.isArray(strengths)) strengths = [];
            if (!Array.isArray(weaknesses)) weaknesses = [];
            if (strengths.length || weaknesses.length) {
                html += `<div class="sw-grid fade-in">`;
                html += `
                <div class="admin-card" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.15);">
                    <h3 style="color: #10b981; margin-bottom: 1rem; font-size: 1.1rem;">💪 Силни страни</h3>
                    <ul style="list-style: none; padding: 0; margin: 0;">
                        ${strengths.map(s => `<li style="padding: 0.4rem 0; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 0.5rem;"><span style="color: #10b981; flex-shrink: 0;">●</span> ${escapeHtml(s)}</li>`).join('')}
                        ${!strengths.length ? '<li style="color: var(--text-muted);">Няма данни</li>' : ''}
                    </ul>
                </div>`;
                html += `
                <div class="admin-card" style="background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.15);">
                    <h3 style="color: #ef4444; margin-bottom: 1rem; font-size: 1.1rem;">⚠️ Слаби страни</h3>
                    <ul style="list-style: none; padding: 0; margin: 0;">
                        ${weaknesses.map(w => `<li style="padding: 0.4rem 0; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 0.5rem;"><span style="color: #ef4444; flex-shrink: 0;">●</span> ${escapeHtml(w)}</li>`).join('')}
                        ${!weaknesses.length ? '<li style="color: var(--text-muted);">Няма данни</li>' : ''}
                    </ul>
                </div>`;
                html += `</div>`;
            }

            // Justifications — stored as JSON object in ev.justifications
            let justs = ev.justifications || {};
            if (typeof justs === 'string') { try { justs = JSON.parse(justs); } catch(e) { justs = {}; } }
            const justKeys = Object.keys(JUSTIFICATION_LABELS);
            const hasJustifications = justKeys.some(k => justs[k]);
            if (hasJustifications) {
                html += `
                <div class="admin-card fade-in">
                    <div class="collapsible-header open" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open');" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-primary);">📝 Обосновки</h3>
                        <span class="collapsible-icon" style="transition: transform 0.3s; color: var(--text-muted);">▼</span>
                    </div>
                    <div class="collapsible-body open" style="overflow: hidden; transition: max-height 0.4s ease; max-height: none;">
                        ${justKeys.map(k => {
                            if (!justs[k]) return '';
                            return `
                            <div style="margin-top: 1rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.5rem;">
                                <div style="font-weight: 600; color: var(--accent-secondary); margin-bottom: 0.5rem; font-size: 0.9rem;">${JUSTIFICATION_LABELS[k]}</div>
                                <p style="color: var(--text-secondary); margin: 0; line-height: 1.6;">${escapeHtml(justs[k])}</p>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }

            // AI Detection
            if (ev.ai_probability != null || ev.ai_reasoning) {
                const aiProb = ev.ai_probability != null ? ev.ai_probability : 0;
                const aiPct = Math.round(aiProb);  // already in percent (0-100)
                const aiColor = aiProb > 70 ? '#ef4444' : aiProb > 40 ? '#f59e0b' : '#10b981';
                html += `
                <div class="admin-card fade-in">
                    <div class="collapsible-header open" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open');" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-primary);">🤖 AI Детекция</h3>
                        <span class="collapsible-icon" style="transition: transform 0.3s; color: var(--text-muted);">▼</span>
                    </div>
                    <div class="collapsible-body open" style="overflow: hidden; transition: max-height 0.4s ease; max-height: none;">
                        <div style="margin-top: 1rem;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <span style="color: var(--text-secondary); font-size: 0.9rem;">Вероятност за AI съдържание</span>
                                <span style="color: ${aiColor}; font-weight: 700;">${aiPct}%</span>
                            </div>
                            <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;">
                                <div style="width: ${aiPct}%; height: 100%; background: ${aiColor}; border-radius: 4px; transition: width 1s ease;"></div>
                            </div>
                            ${ev.ai_reasoning ? `
                            <p style="color: var(--text-secondary); margin-top: 1rem; line-height: 1.6; font-size: 0.9rem;">${escapeHtml(ev.ai_reasoning)}</p>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
            }

            // Spelling errors
            let spellingErrors = ev.spelling_errors || [];
            if (typeof spellingErrors === 'string') {
                try { spellingErrors = JSON.parse(spellingErrors); } catch(e) { spellingErrors = []; }
            }
            if (Array.isArray(spellingErrors) && spellingErrors.length) {
                html += `
                <div class="admin-card fade-in">
                    <div class="collapsible-header open" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open');" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-primary);">✏️ Правописни грешки <span class="admin-badge admin-badge-blue" style="margin-left: 0.5rem;">${spellingErrors.length}</span></h3>
                        <span class="collapsible-icon" style="transition: transform 0.3s; color: var(--text-muted);">▼</span>
                    </div>
                    <div class="collapsible-body open" style="overflow: hidden; transition: max-height 0.4s ease; max-height: none;">
                        <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem;">
                            ${spellingErrors.map(err => {
                                if (typeof err === 'string') {
                                    return `<div style="padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border-radius: 0.5rem; border-left: 3px solid var(--accent-secondary); color: var(--text-primary);">${escapeHtml(err)}</div>`;
                                }
                                return `
                                <div style="padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border-radius: 0.5rem; border-left: 3px solid var(--accent-secondary);">
                                    <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.4rem;">
                                        <span style="color: #ef4444; font-weight: 600; text-decoration: line-through;">${escapeHtml(err.word || '')}</span>
                                        <span style="color: var(--text-muted);">→</span>
                                        <span style="color: #10b981; font-weight: 600;">${escapeHtml(err.suggestion || err.correct || '')}</span>
                                    </div>
                                    ${err.context ? `<p style="color: var(--text-muted); margin: 0; font-size: 0.85rem; font-style: italic;">„${escapeHtml(err.context)}"</p>` : ''}
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            }

            container.innerHTML = html;
            container.style.display = 'block';
            document.getElementById('loading').style.display = 'none';

            // Animate score ring
            requestAnimationFrame(() => {
                setTimeout(() => {
                    const ring = container.querySelector('.score-ring-svg circle:nth-child(2)');
                    if (ring) {
                        ring.style.strokeDashoffset = ring.getAttribute('data-target-offset');
                    }
                }, 100);
            });

            // Animate fade-ins
            const fadeEls = container.querySelectorAll('.fade-in');
            fadeEls.forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + i * 100);
            });
        }

        async function loadEvaluation() {
            if (!evalId) {
                showToast('Липсва ID на оценка');
                return;
            }
            try {
                const ev = await apiFetch(`/evaluations/${evalId}`);
                document.title = `${ev.title_scraped || 'Оценка'} — СЛОВОЯД Админ`;
                renderDetail(ev);
            } catch(e) {
                document.getElementById('loading').innerHTML = `
                    <p style="color: #ef4444; font-size: 1.1rem;">❌ Грешка при зареждане</p>
                    <p style="color: var(--text-muted);">${escapeHtml(e.message)}</p>
                    <a href="/manage/evaluations" class="admin-btn admin-btn-ghost" style="margin-top: 1rem; display: inline-block;">← Обратно към списъка</a>
                `;
            }
        }

        // Collapsible toggle logic
        document.addEventListener('click', (e) => {
            const header = e.target.closest('.collapsible-header');
            if (!header) return;
            const body = header.nextElementSibling;
            const icon = header.querySelector('.collapsible-icon');
            if (body.style.maxHeight && body.style.maxHeight !== '0px') {
                body.style.maxHeight = '0';
                if (icon) icon.style.transform = 'rotate(0deg)';
            } else {
                body.style.maxHeight = body.scrollHeight + 'px';
                if (icon) icon.style.transform = 'rotate(180deg)';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            setupSidebar();
            setupLogout();
            loadEvaluation();
        });
    </script>
</body>
</html>
