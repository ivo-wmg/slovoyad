<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Потребител — СЛОВОЯД Админ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/manage/css/admin.css">
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <style>
        .form-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 2rem;
            max-width: 560px;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted, #6b7280);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.4rem;
        }
        .form-group .admin-input {
            width: 100%;
            box-sizing: border-box;
        }
        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .form-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: none;
        }
        .form-hint {
            font-size: 0.78rem;
            color: var(--text-muted, #6b7280);
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>

<div class="admin-layout">
    <button class="admin-mobile-toggle" aria-label="Меню">☰</button>
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <a href="/manage"><img src="/static/images/logo.png" alt="СЛОВОЯД" style="max-width: 140px; height: auto;"></a>
        </div>
        <nav class="admin-nav">
            <a href="/manage"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Табло</a>
            <a href="/manage/evaluations"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> Оценки</a>
            <a href="/manage/groups"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> Групи</a>
            <a href="/manage/users" class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Потребители</a>
        </nav>
        <div class="admin-sidebar-footer">
            <a href="/" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Към сайта</a>
            <a href="#" id="logout-btn" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Изход</a>
        </div>
    </aside>
    <main class="admin-content">

        <div class="admin-content-header" style="display:flex; align-items:center; gap:1rem;">
            <a href="/manage/users" class="admin-btn admin-btn-ghost admin-btn-sm">← Назад</a>
            <h2 id="page-title">Нов потребител</h2>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label>Имейл адрес</label>
                <input type="email" id="user-email" class="admin-input" placeholder="user@example.com" autocomplete="off">
            </div>
            <div class="form-group">
                <label id="password-label">Парола</label>
                <input type="password" id="user-password" class="admin-input" placeholder="Минимум 6 символа" autocomplete="new-password">
                <div class="form-hint" id="password-hint"></div>
            </div>
            <div class="form-group">
                <label>Роля</label>
                <select id="user-role" class="admin-input">
                    <option value="admin">Администратор</option>
                    <option value="editor">Редактор</option>
                    <option value="viewer">Наблюдател</option>
                </select>
            </div>
            <div class="form-error" id="form-error"></div>
            <div class="form-actions">
                <a href="/manage/users" class="admin-btn admin-btn-ghost">Отказ</a>
                <button class="admin-btn admin-btn-primary" id="save-btn" onclick="saveUser()">Запази</button>
            </div>
        </div>

    </main>
</div>

<script src="/static/manage/js/admin.js"></script>
<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const isEdit = pathParts.includes('edit');
const userId = isEdit ? pathParts[pathParts.indexOf('users') + 1] : null;

async function init() {
    setupSidebar();
    setupLogout();

    if (isEdit && userId) {
        document.getElementById('page-title').textContent = 'Редакция на потребител';
        document.getElementById('password-hint').textContent = 'Оставете празно ако не искате да сменяте паролата';
        document.getElementById('password-label').textContent = 'Нова парола (по избор)';
        document.getElementById('user-password').removeAttribute('placeholder');

        try {
            const data = await apiFetch(`/users/${userId}`);
            if (data) {
                document.getElementById('user-email').value = data.email || '';
                document.getElementById('user-role').value = data.role || 'admin';
            }
        } catch(e) {
            showToast('Грешка при зареждане: ' + e.message);
        }
    }
}

async function saveUser() {
    const email = document.getElementById('user-email').value.trim();
    const password = document.getElementById('user-password').value;
    const role = document.getElementById('user-role').value;
    const errEl = document.getElementById('form-error');
    errEl.style.display = 'none';

    if (!email) {
        errEl.textContent = 'Въведете имейл адрес';
        errEl.style.display = 'block';
        return;
    }

    if (!isEdit && (!password || password.length < 6)) {
        errEl.textContent = 'Паролата трябва да е поне 6 символа';
        errEl.style.display = 'block';
        return;
    }

    if (isEdit && password && password.length < 6) {
        errEl.textContent = 'Паролата трябва да е поне 6 символа';
        errEl.style.display = 'block';
        return;
    }

    const body = { email, role };
    if (password) body.password = password;

    try {
        if (isEdit) {
            await apiFetch(`/users/${userId}`, {
                method: 'PUT',
                body: JSON.stringify(body)
            });
            showToast('Потребителят е обновен', 'success');
        } else {
            if (!password) {
                errEl.textContent = 'Паролата е задължителна за нов потребител';
                errEl.style.display = 'block';
                return;
            }
            await apiFetch('/users', {
                method: 'POST',
                body: JSON.stringify(body)
            });
            showToast('Потребителят е създаден', 'success');
        }
        setTimeout(() => window.location.href = '/manage/users', 500);
    } catch(e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
