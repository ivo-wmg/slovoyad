<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Потребители — СЛОВОЯД Админ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/manage/css/admin.css?v=2">
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
</head>
<body>

<div class="admin-layout">
    <button class="admin-mobile-toggle" aria-label="Меню">☰</button>
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <a href="/manage"><img src="/static/images/logo.png" alt="СЛОВОЯД" style="max-width: 140px; height: auto;"></a>
        </div>
        <nav class="admin-nav">
            <a href="/manage"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Табло</a>
            <a href="/manage/evaluations"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> Оценки</a>
            <a href="/manage/groups"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> Групи</a>
            <a href="/manage/users" class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Потребители</a>
        </nav>
        <div class="admin-sidebar-footer">
            <a href="/" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Към сайта</a>
            <a href="#" id="logout-btn" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Изход</a>
        </div>
    </aside>
    <main class="admin-content">

        <div class="admin-content-header" style="display:flex; align-items:center; justify-content:space-between;">
            <h2>Потребители</h2>
            <a href="/manage/users/add" class="admin-btn admin-btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Добави потребител</a>
        </div>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имейл</th>
                        <th>Роля</th>
                        <th>Създаден</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="users-body">
                    <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Зареждане...</td></tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

<script src="/static/manage/js/admin.js?v=2"></script>
<script>
const ROLE_LABELS = { admin: 'Администратор', editor: 'Редактор', viewer: 'Наблюдател' };
const ROLE_BADGE = { admin: 'admin-badge-blue', editor: 'admin-badge-green', viewer: 'admin-badge-yellow' };
let currentUserEmail = '';

async function loadCurrentUser() {
    try {
        const me = await apiFetch('/me');
        currentUserEmail = me.email || '';
    } catch(e) {}
}

async function loadUsers() {
    try {
        const data = await apiFetch('/users');
        const users = data.users || [];
        const tbody = document.getElementById('users-body');

        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Няма потребители</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(u => {
            const isMe = u.email === currentUserEmail;
            return `
            <tr>
                <td style="color:var(--text-muted);">${u.id}</td>
                <td style="color:var(--text-primary); font-weight:500;">${escapeHtml(u.email)}${isMe ? ' <span style="font-size:0.75rem; color:var(--accent-secondary,#818cf8);">(Вие)</span>' : ''}</td>
                <td><span class="admin-badge ${ROLE_BADGE[u.role] || 'admin-badge-blue'}">${ROLE_LABELS[u.role] || u.role}</span></td>
                <td style="color:var(--text-muted);">${formatDate(u.created_at)}</td>
                <td>
                    <a href="/manage/users/${u.id}/edit" class="admin-btn admin-btn-ghost admin-btn-sm">${icon('edit')}</a>
                    ${!isMe ? `<button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deleteUser(${u.id}, '${escapeHtml(u.email)}')">${icon('trash')}</button>` : ''}
                </td>
            </tr>`;
        }).join('');
    } catch(e) {
        showToast('Грешка: ' + e.message);
    }
}

async function deleteUser(id, email) {
    if (!await confirmModal('Изтриване', `Сигурни ли сте, че искате да изтриете <strong>${email}</strong>?`)) return;
    try {
        await apiFetch(`/users/${id}`, { method: 'DELETE' });
        showToast('Потребителят е изтрит', 'success');
        loadUsers();
    } catch(e) {
        showToast('Грешка: ' + e.message);
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    setupSidebar();
    setupLogout();
    await loadCurrentUser();
    loadUsers();
});
</script>

</body>
</html>
