<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Потребители — СЛОВОЯД Админ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/manage/css/admin.css">
    <style>
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .user-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            border-color: rgba(99,102,241,0.3);
            background: rgba(255,255,255,0.06);
        }
        .user-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .user-info {
            flex: 1;
            min-width: 0;
        }
        .user-email {
            font-weight: 600;
            color: var(--text-primary, #f0f0f5);
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .user-meta {
            font-size: 0.8rem;
            color: var(--text-muted, #6b7280);
            margin-top: 0.2rem;
        }
        .user-card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .user-you-tag {
            font-size: 0.75rem;
            color: var(--accent-secondary, #818cf8);
            background: rgba(99,102,241,0.12);
            border-radius: 6px;
            padding: 0.15rem 0.5rem;
            margin-left: auto;
        }

        /* Add user form */
        .add-user-card {
            background: rgba(99,102,241,0.06);
            border: 1px dashed rgba(99,102,241,0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .add-user-card h3 {
            margin: 0 0 1rem 0;
            font-size: 1rem;
            color: var(--text-primary, #f0f0f5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .form-group label {
            font-size: 0.8rem;
            color: var(--text-muted, #6b7280);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted, #6b7280);
        }
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-mini {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .stat-mini-icon {
            font-size: 1.5rem;
        }
        .stat-mini-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary, #f0f0f5);
        }
        .stat-mini-label {
            font-size: 0.75rem;
            color: var(--text-muted, #6b7280);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
            .users-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="admin-layout">
    <button class="admin-mobile-toggle" aria-label="Меню">☰</button>
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h1 class="admin-logo">СЛОВОЯД</h1>
            <span class="admin-logo-sub">Админ панел</span>
        </div>
        <nav class="admin-nav">
            <a href="/manage">📊 Табло</a>
            <a href="/manage/evaluations">📋 Оценки</a>
            <a href="/manage/groups">📁 Групи</a>
            <a href="/manage/users" class="active">👥 Потребители</a>
        </nav>
        <div class="admin-sidebar-footer">
            <a href="/" class="admin-nav-link">← Към сайта</a>
            <a href="#" id="logout-btn" class="admin-nav-link">🚪 Изход</a>
        </div>
    </aside>
    <main class="admin-content">

        <div class="admin-content-header">
            <h2>👥 Потребители</h2>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="stats-row"></div>

        <!-- Add User Form -->
        <div class="add-user-card" id="add-form">
            <h3>➕ Добави нов потребител</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Имейл</label>
                    <input type="email" id="new-email" class="admin-input" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Парола</label>
                    <input type="password" id="new-password" class="admin-input" placeholder="Минимум 6 символа">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Роля</label>
                    <select id="new-role" class="admin-input">
                        <option value="admin">Администратор</option>
                        <option value="editor">Редактор</option>
                        <option value="viewer">Наблюдател</option>
                    </select>
                </div>
                <div class="form-actions" style="align-items: flex-end;">
                    <button class="admin-btn admin-btn-primary" onclick="addUser()">💾 Създай потребител</button>
                </div>
            </div>
            <div id="form-error" style="display:none; color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem;"></div>
        </div>

        <!-- Users Grid -->
        <div class="users-grid" id="users-grid">
            <div class="empty-state">Зареждане...</div>
        </div>

    </main>
</div>

<script src="/static/manage/js/admin.js"></script>
<script>
let currentUserEmail = '';

async function loadCurrentUser() {
    try {
        const me = await apiFetch('/me');
        currentUserEmail = me.email || '';
    } catch(e) {}
}

function roleLabel(role) {
    const map = { admin: 'Администратор', editor: 'Редактор', viewer: 'Наблюдател' };
    return map[role] || role;
}

function roleBadgeClass(role) {
    const map = { admin: 'admin-badge-blue', editor: 'admin-badge-green', viewer: 'admin-badge-yellow' };
    return map[role] || 'admin-badge-blue';
}

async function loadUsers() {
    try {
        const data = await apiFetch('/users');
        const users = data.items || data || [];
        const grid = document.getElementById('users-grid');

        // Stats
        const admins = users.filter(u => u.role === 'admin').length;
        const others = users.length - admins;
        document.getElementById('stats-row').innerHTML = `
            <div class="stat-mini">
                <div class="stat-mini-icon">👥</div>
                <div>
                    <div class="stat-mini-value">${users.length}</div>
                    <div class="stat-mini-label">Общо</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon">🛡️</div>
                <div>
                    <div class="stat-mini-value">${admins}</div>
                    <div class="stat-mini-label">Админи</div>
                </div>
            </div>
        `;

        if (!users.length) {
            grid.innerHTML = '<div class="empty-state">Няма потребители</div>';
            return;
        }

        grid.innerHTML = users.map(u => {
            const initials = u.email.substring(0, 2);
            const isMe = u.email === currentUserEmail;
            return `
            <div class="user-card">
                <div class="user-card-header">
                    <div class="user-avatar">${escapeHtml(initials)}</div>
                    <div class="user-info">
                        <div class="user-email">${escapeHtml(u.email)}</div>
                        <div class="user-meta">Създаден: ${formatDate(u.created_at)}</div>
                    </div>
                    ${isMe ? '<span class="user-you-tag">Вие</span>' : ''}
                </div>
                <div style="margin-bottom: 0.5rem;">
                    <span class="admin-badge ${roleBadgeClass(u.role)}">${roleLabel(u.role)}</span>
                </div>
                <div class="user-card-actions">
                    ${!isMe ? `
                        <button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deleteUser(${u.id}, '${escapeHtml(u.email)}')">
                            🗑️ Изтрий
                        </button>
                    ` : `<span style="font-size: 0.8rem; color: var(--text-muted);">Не може да изтриете себе си</span>`}
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        showToast('Грешка: ' + e.message);
    }
}

async function addUser() {
    const email = document.getElementById('new-email').value.trim();
    const password = document.getElementById('new-password').value;
    const role = document.getElementById('new-role').value;
    const errEl = document.getElementById('form-error');
    errEl.style.display = 'none';

    if (!email) { errEl.textContent = 'Въведете имейл адрес'; errEl.style.display = 'block'; return; }
    if (!password || password.length < 6) { errEl.textContent = 'Паролата трябва да е поне 6 символа'; errEl.style.display = 'block'; return; }

    try {
        await apiFetch('/users', {
            method: 'POST',
            body: JSON.stringify({ email, password, role })
        });
        showToast('Потребителят е създаден успешно', 'success');
        document.getElementById('new-email').value = '';
        document.getElementById('new-password').value = '';
        loadUsers();
    } catch(e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
    }
}

async function deleteUser(id, email) {
    if (!await confirmModal('Изтриване на потребител', `Сигурни ли сте, че искате да изтриете <strong>${email}</strong>? Действието е необратимо.`)) return;
    try {
        await apiFetch(`/users/${id}`, { method: 'DELETE' });
        showToast('Потребителят е изтрит', 'success');
        loadUsers();
    } catch(e) {
        showToast('Грешка: ' + e.message);
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    setupSidebar();
    setupLogout();
    await loadCurrentUser();
    loadUsers();
});
</script>

</body>
</html>
