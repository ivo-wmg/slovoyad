<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки — СЛОВОЯД Админ</title>
    <meta name="description" content="Управление на оценки в админ панела на СЛОВОЯД">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/manage/css/admin.css">
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
</head>
<body>
    <div class="admin-layout">
        <button class="admin-mobile-toggle" aria-label="Меню">☰</button>
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <a href="/manage"><img src="/static/images/logo.png" alt="СЛОВОЯД" style="max-width: 140px; height: auto;"></a>
            </div>
            <nav class="admin-nav">
                <a href="/manage"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Табло</a>
                <a href="/manage/evaluations" class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> Оценки</a>
                <a href="/manage/groups"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> Групи</a>
                <a href="/manage/users"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Потребители</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="/" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Към сайта</a>
                <a href="#" id="logout-btn" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Изход</a>
            </div>
        </aside>
        <main class="admin-content">
            <div class="admin-content-header">
                <h2>Оценки</h2>
            </div>

            <div class="admin-search">
                <input type="text" id="search-input" placeholder="Търсене по заглавие или URL...">
                <select id="domain-filter">
                    <option value="">Всички домейни</option>
                </select>
                <button class="admin-btn admin-btn-primary" onclick="doSearch()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Търсене</button>
                <button class="admin-btn admin-btn-primary" onclick="openNewEvalModal()" style="margin-left: auto; background: linear-gradient(135deg, #22c55e, #16a34a);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Нова оценка</button>
            </div>

            <!-- New Evaluation Modal -->
            <div id="new-eval-modal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
                <div style="background:#16161f; border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:2rem; width:90%; max-width:520px; position:relative;">
                    <h3 style="margin:0 0 1.25rem 0; color:var(--text-primary,#f0f0f5); font-size:1.1rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Нова оценка на статия</h3>
                    <div style="margin-bottom:1rem;">
                        <label style="font-size:0.8rem; color:var(--text-muted,#6b7280); text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:0.35rem;">URL на статията</label>
                        <input type="url" id="eval-url-input" class="admin-input" placeholder="https://..." style="width:100%;">
                    </div>
                    <div id="eval-progress" style="display:none; margin-bottom:1rem;">
                        <div style="display:flex; align-items:center; gap:0.75rem;">
                            <div class="spinner" style="width:20px;height:20px;border:2px solid rgba(99,102,241,0.3);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
                            <span style="color:var(--text-secondary,#9ca3af); font-size:0.9rem;" id="eval-status-text">Оценяване...</span>
                        </div>
                    </div>
                    <div id="eval-error" style="display:none; color:#ef4444; font-size:0.85rem; margin-bottom:1rem;"></div>
                    <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
                        <button class="admin-btn admin-btn-ghost" onclick="closeNewEvalModal()">Отказ</button>
                        <button class="admin-btn admin-btn-primary" id="eval-submit-btn" onclick="submitNewEval()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg> Оцени</button>
                    </div>
                </div>
            </div>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

            <div class="admin-table-wrap">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Заглавие</th>
                            <th>Домейн</th>
                            <th>Оценка</th>
                            <th>Версия</th>
                            <th>Дата</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="evaluations-body"></tbody>
                </table>
            </div>

            <div class="admin-pagination" id="pagination"></div>
        </main>
    </div>

    <script src="/static/manage/js/admin.js?v=2"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let searchQuery = '';
        let domainFilter = '';

        async function loadDomains() {
            try {
                const data = await apiFetch('/domains');
                const domains = data.domains || [];
                const select = document.getElementById('domain-filter');
                domains.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d;
                    select.appendChild(opt);
                });
            } catch(e) {}
        }

        async function loadEvaluations() {
            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    limit: 20,
                    ...(searchQuery && { search: searchQuery }),
                    ...(domainFilter && { domain: domainFilter })
                });
                const data = await apiFetch('/evaluations?' + params);
                const items = data.items || [];
                totalPages = data.total_pages || 1;

                const tbody = document.getElementById('evaluations-body');
                tbody.innerHTML = items.map(ev => `
                    <tr>
                        <td style="color: var(--text-muted);">${ev.id}</td>
                        <td><a href="/manage/evaluations/${ev.id}" style="color: var(--text-primary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--accent-secondary)'" onmouseout="this.style.color='var(--text-primary)'">${escapeHtml((ev.title_scraped || 'Без заглавие').substring(0, 60))}${(ev.title_scraped || '').length > 60 ? '...' : ''}</a></td>
                        <td><span class="admin-badge admin-badge-blue">${escapeHtml(ev.domain || '—')}</span></td>
                        <td><span style="color: ${scoreColor(ev.final_overall_score)}; font-weight: 700;">${ev.final_overall_score?.toFixed(1) || '—'}</span></td>
                        <td style="color: var(--text-muted);">v${ev.version || 1}</td>
                        <td style="color: var(--text-muted);">${formatDate(ev.evaluated_at)}</td>
                        <td><button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deleteEvaluation(${ev.id})">${icon('trash')}</button></td>
                    </tr>
                `).join('');

                renderPagination();
            } catch(e) {
                showToast('Грешка при зареждане: ' + e.message);
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            let html = '';
            html += `<button class="admin-btn admin-btn-ghost" ${currentPage <= 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">← Предишна</button>`;

            const maxVisible = 5;
            let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let end = Math.min(totalPages, start + maxVisible - 1);
            if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1);

            if (start > 1) html += `<button class="admin-btn admin-btn-ghost" onclick="changePage(1)">1</button>`;
            if (start > 2) html += `<span style="color: var(--text-muted); padding: 0.5rem;">...</span>`;

            for (let i = start; i <= end; i++) {
                html += `<button class="admin-btn ${i === currentPage ? 'admin-btn-primary' : 'admin-btn-ghost'}" onclick="changePage(${i})">${i}</button>`;
            }

            if (end < totalPages - 1) html += `<span style="color: var(--text-muted); padding: 0.5rem;">...</span>`;
            if (end < totalPages) html += `<button class="admin-btn admin-btn-ghost" onclick="changePage(${totalPages})">${totalPages}</button>`;

            html += `<button class="admin-btn admin-btn-ghost" ${currentPage >= totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Следваща →</button>`;
            container.innerHTML = html;
        }

        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadEvaluations();
        }

        async function deleteEvaluation(id) {
            if (!await confirmModal('Изтриване', `Сигурни ли сте, че искате да изтриете оценка #${id}?`)) return;
            try {
                await apiFetch(`/evaluations/${id}`, { method: 'DELETE' });
                showToast('Оценката е изтрита', 'success');
                loadEvaluations();
            } catch(e) {
                showToast('Грешка: ' + e.message);
            }
        }

        function doSearch() {
            searchQuery = document.getElementById('search-input').value;
            domainFilter = document.getElementById('domain-filter').value;
            currentPage = 1;
            loadEvaluations();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupSidebar();
            setupLogout();
            loadDomains();
            loadEvaluations();
            document.getElementById('search-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') doSearch(); });
            document.getElementById('eval-url-input').addEventListener('keyup', (e) => { if (e.key === 'Enter') submitNewEval(); });
        });

        function openNewEvalModal() {
            const modal = document.getElementById('new-eval-modal');
            modal.style.display = 'flex';
            document.getElementById('eval-url-input').value = '';
            document.getElementById('eval-error').style.display = 'none';
            document.getElementById('eval-progress').style.display = 'none';
            document.getElementById('eval-submit-btn').disabled = false;
            setTimeout(() => document.getElementById('eval-url-input').focus(), 100);
        }

        function closeNewEvalModal() {
            document.getElementById('new-eval-modal').style.display = 'none';
        }

        async function submitNewEval() {
            const url = document.getElementById('eval-url-input').value.trim();
            const errEl = document.getElementById('eval-error');
            const progressEl = document.getElementById('eval-progress');
            const submitBtn = document.getElementById('eval-submit-btn');
            errEl.style.display = 'none';

            if (!url || !url.startsWith('http')) {
                errEl.textContent = 'Въведете валиден URL (https://...)';
                errEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            progressEl.style.display = 'block';
            document.getElementById('eval-status-text').textContent = 'Скрейпване и оценяване... (до 30 сек.)';

            try {
                const resp = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || 'Грешка при оценяване');
                }
                const data = await resp.json();
                closeNewEvalModal();
                showToast('Оценката е готова!', 'success');
                // Navigate to the new evaluation
                if (data.current && data.current.id) {
                    window.location.href = '/manage/evaluations/' + data.current.id;
                } else {
                    loadEvaluations();
                }
            } catch(e) {
                errEl.textContent = e.message;
                errEl.style.display = 'block';
                progressEl.style.display = 'none';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
