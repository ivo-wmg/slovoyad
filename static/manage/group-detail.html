<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детайли на група — СЛОВОЯД Админ</title>
    <meta name="description" content="Преглед на детайли и прогрес на група за bulk check оценки.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/manage/css/admin.css">
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
</head>
<body>

<div class="admin-layout">
    <button class="admin-mobile-toggle" aria-label="Меню">☰</button>
    <aside class="admin-sidebar">
        <div class="admin-sidebar-header">
            <a href="/manage"><img src="/static/images/logo.png" alt="СЛОВОЯД" style="max-width: 140px; height: auto;"></a>
        </div>
        <nav class="admin-nav">
            <a href="/manage"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Табло</a>
            <a href="/manage/evaluations"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg> Оценки</a>
            <a href="/manage/groups" class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> Групи</a>
            <a href="/manage/users"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Потребители</a>
        </nav>
        <div class="admin-sidebar-footer">
            <a href="/" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Към сайта</a>
            <a href="#" id="logout-btn" class="admin-nav-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Изход</a>
        </div>
    </aside>
    <main class="admin-content">

        <div class="admin-content-header">
            <a href="/manage/groups" class="admin-btn admin-btn-ghost"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Назад</a>
            <h2 id="group-title">Детайли на група</h2>
        </div>

        <div class="admin-card" id="group-info">
            <!-- populated by JS -->
        </div>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>URL</th>
                        <th>Статус</th>
                        <th>Заглавие</th>
                        <th>Оценка</th>
                        <th>Грешка</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="urls-body"></tbody>
            </table>
        </div>

    </main>
</div>

<script src="/static/manage/js/admin.js"></script>
<script>
let refreshInterval = null;

async function loadGroup() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { window.location.href = '/manage/groups'; return; }

    try {
        const group = await apiFetch(`/groups/${id}`);
        document.getElementById('group-title').textContent = group.name || `Група #${id}`;

        const total = group.total_urls || 0;
        const completed = group.completed_urls || 0;
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

        document.getElementById('group-info').innerHTML = `
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
                <span style="font-size: 1.1rem; font-weight: 600; color: var(--text-primary);">${escapeHtml(group.name)}</span>
                ${statusBadge(group.status)}
            </div>
            <div class="admin-progress" style="margin-bottom: 1rem; height: 8px;">
                <div class="admin-progress-fill" style="width: ${pct}%;"></div>
            </div>
            <div style="display: flex; gap: 2rem; flex-wrap: wrap; font-size: 0.88rem; color: var(--text-secondary);">
                <span>${icon('dashboard')} Прогрес: <strong style="color: var(--text-primary);">${completed}/${total}</strong> (${pct}%)</span>
                <span>${icon('error')} Грешки: <strong style="color: ${group.error_count > 0 ? 'var(--red)' : 'var(--text-primary)'};">${group.error_count || 0}</strong></span>
                <span>${icon('calendar')} Създадена: <strong style="color: var(--text-primary);">${formatDate(group.created_at)}</strong></span>
                ${group.created_by ? `<span>${icon('user')} От: <strong style="color: var(--text-primary);">${escapeHtml(group.created_by)}</strong></span>` : ''}
            </div>
        `;

        // URLs table
        const urls = group.urls || [];
        const tbody = document.getElementById('urls-body');
        tbody.innerHTML = urls.map(u => `
            <tr>
                <td><a href="${escapeHtml(u.url)}" target="_blank" rel="noopener" style="color: var(--accent-secondary); text-decoration: none; font-size: 0.85rem;" title="${escapeHtml(u.url)}">${escapeHtml((u.url || '').substring(0, 60))}${(u.url || '').length > 60 ? '...' : ''}</a></td>
                <td>${statusBadge(u.status)}</td>
                <td style="color: var(--text-primary); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(u.title || '—')}</td>
                <td>${u.score != null ? `<span style="color: ${scoreColor(u.score)}; font-weight: 700;">${u.score.toFixed(1)}</span>` : '—'}</td>
                <td style="color: var(--red); font-size: 0.85rem; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${escapeHtml(u.error || '')}">${u.error ? escapeHtml(u.error) : ''}</td>
                <td>${u.evaluation_id ? `<a href="/manage/evaluations/${u.evaluation_id}" class="admin-btn admin-btn-ghost admin-btn-sm">Виж →</a>` : ''}</td>
            </tr>
        `).join('');

        // Auto-refresh logic
        if (group.status === 'running' || group.status === 'processing') {
            if (!refreshInterval) {
                refreshInterval = setInterval(loadGroup, 5000);
            }
        } else {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }
    } catch(e) {
        showToast('Грешка: ' + e.message);
    }
}

document.addEventListener('DOMContentLoaded', loadGroup);
</script>

</body>
</html>
